<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Loginhelper</title>

<!-- ✅ CORRECTE QR LIBRARY -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
:root {
  --groen: #9DC66B;
  --groen-donker: #7FA650;
  --blauw: #4A5C8A;
  --lichtblauw: #E5F1F6;
  --wit: #ffffff;
}

body {
  font-family: Arial, sans-serif;
  background: var(--lichtblauw);
  margin: 0;
  padding: 40px 20px;
}

.container {
  background: var(--wit);
  padding: 25px;
  border-radius: 20px;
  max-width: 900px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h1, h2 {
  color: var(--blauw);
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid var(--groen);
  font-size: 20px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  background: var(--groen);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
}

button:hover {
  background: var(--groen-donker);
}

#emailDisplay {
  margin-top: 15px;
  font-size: 22px;
  text-align: center;
  font-weight: bold;
  color: var(--blauw);
}

/* Scanner */
#reader {
  margin-top: 15px;
  display: none;
  border-radius: 10px;
  overflow: hidden;
}

#status {
  margin-top: 10px;
  text-align: center;
  font-size: 16px;
  color: var(--blauw);
}

</style>
</head>

<body>

<div class="container">

<div>
<h1>Loginhelper</h1>

<input id="s" placeholder="Typ S-nummer..." oninput="makeEmail()">

<button onclick="startScanner()">📷 Scan QR-code</button>

<div id="status"></div>
<div id="reader"></div>

<div id="emailDisplay"></div>
</div>

<div>
<h2>Office</h2>
<button onclick="openApp('teams')">Teams</button>
<button onclick="openApp('word')">Word</button>
<button onclick="openApp('powerpoint')">PowerPoint</button>
<button onclick="openApp('onedrive')">OneDrive</button>
<button onclick="openApp('outlook')">Outlook</button>
</div>

</div>

<script>

let currentEmail = "";
let scanner = null;

/* ===== EMAIL VIA INPUT ===== */
function makeEmail() {
  let raw = document.getElementById("s").value.trim().toLowerCase();

  if (raw.startsWith("s")) raw = raw.slice(1);

  if (/^[0-9]{6}$/.test(raw)) {
    currentEmail = "s" + raw + "@leerling.vbshgoor.be";
  } else {
    currentEmail = "";
  }

  updateDisplay();
}

/* ===== DISPLAY ===== */
function updateDisplay() {
  document.getElementById("emailDisplay").textContent =
    currentEmail ? "✅ " + currentEmail : "";
}

/* ===== QR SCANNER ===== */
function startScanner() {

  const status = document.getElementById("status");
  const reader = document.getElementById("reader");

  status.textContent = "🔍 Scanner wordt gestart...";
  reader.style.display = "block";

  if (scanner) {
    scanner.stop().catch(()=>{});
  }

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    },
    (decodedText) => {

      handleQRCode(decodedText);

      scanner.stop().then(() => {
        reader.style.display = "none";
        status.textContent = "✅ QR-code gescand";
      });

    },
    (error) => {
      // stil houden, spam vermijden
    }

  ).catch(err => {
    status.textContent = "❌ Camera werkt niet";
    alert("Camera kan niet starten. Gebruik https of geef S-nummer in.");
  });
}

/* ===== QR RESULT ===== */
function handleQRCode(data) {

  data = data.trim().toLowerCase();

  if (data.includes("@")) {
    currentEmail = data;
  }
  else if (/^[0-9]{6}$/.test(data)) {
    currentEmail = "s" + data + "@leerling.gvbbooischot.be";
  }
  else {
    alert("QR-code ongeldig");
    return;
  }

  document.getElementById("s").value = "";
  updateDisplay();
}

/* ===== OPEN APPS ===== */
function openApp(app) {

  if (!currentEmail) {
    alert("⚠️ Eerst scannen of S-nummer ingeven");
    return;
  }

  let url = "";

  switch(app) {
    case "teams":
      url = "https://teams.microsoft.com/?login_hint=" + currentEmail;
      break;
    case "word":
      url = "https://www.office.com/launch/word?auth=2&login_hint=" + currentEmail;
      break;
    case "powerpoint":
      url = "https://www.office.com/launch/powerpoint?auth=2&login_hint=" + currentEmail;
      break;
    case "onedrive":
      url = "https://www.office.com/launch/onedrive?auth=2&login_hint=" + currentEmail;
      break;
    case "outlook":
      url = "https://www.office.com/launch/outlook?auth=2&login_hint=" + currentEmail;
      break;
  }

  window.open(url, "_blank");
}

</script>

</body>
</html>
