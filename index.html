<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loginhelper</title>

<!-- QR scanner library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Segoe UI, Arial;
    background: #d8e3f0;
}

.container {
    max-width: 850px;
    margin: 60px auto;
    background: #f5f7fa;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

.grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 25px;
    align-items: start;
}

input {
    width: 100%;
    max-width: 100%; /* voorkomt overlappen */
    padding: 15px;
    border-radius: 10px;
    border: 2px solid #84a646;
    font-size: 16px;
    box-sizing: border-box;

}

.button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: #8eb458;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.button:hover {
    background: #769d44;
}

.office h2 {
    margin-top: 0;
    color: #2b4c7e;
}

.icon {
    width: 20px;
}

/* scanner */
#reader {
    margin-top: 15px;
}

@media (max-width: 700px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
.toolbox {
    margin-top: 30px;
}

.toolbox h2 {
    color: #2b4c7e;
    margin-bottom: 15px;
}

.klassen {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}
    
</style>
</head>

<body>

<div class="container">
    <h1>Loginhelper</h1>

    <div class="grid">

        <!-- LINKS -->
        <div>
            <input id="snummer" placeholder="Typ S-nummer (optioneel)…">

            <button class="button" onclick="startScan()">
                📷 Scan QR-code
            </button>

            <div id="reader"></div>
        </div>

        <!-- RECHTS -->
        <div class="office">
            <h2>Office</h2>

            <button class="button" onclick="openApp('teams')">
                <img class="icon" src="https://img.icons8.com/color/48/microsoft-teams.png">
                Teams
            </button>

            <button class="button" onclick="openApp('word')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-word-2019.png">
                Word
            </button>

            <button class="button" onclick="openApp('ppt')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-powerpoint-2019.png">
                PowerPoint
            </button>

            <!-- ✅ FIXED ICONS -->
            <button class="button" onclick="openApp('onedrive')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-onedrive-2019.png">
                OneDrive
            </button>

            <button class="button" onclick="openApp('outlook')">
                <img class="icon" src="https://img.icons8.com/color/48/000000/microsoft-outlook-2019.png">
                Outlook
            </button>
        </div>
<div class="toolbox">
    <h2>Toolboxen per klas</h2>

    <div class="klassen">

        <button class="button" onclick="openToolbox('l1')">📘 L1</button>
        <button class="button" onclick="openToolbox('l2')">📗 L2</button>
        <button class="button" onclick="openToolbox('l3')">📙 L3</button>
        <button class="button" onclick="openToolbox('l4')">📕 L4</button>
        <button class="button" onclick="openToolbox('l5')">📓 L5</button>
        <button class="button" onclick="openToolbox('l6')">📔 L6</button>

    </div>
</div>

    </div>
</div>

<script>

/* ✅ Teams login */
function goToTeams(user) {
    let url = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
        + "?client_id=1fec8e78-bce4-4aaf-ab1b-5451cc387264"
        + "&response_type=code"
        + "&redirect_uri=https://teams.microsoft.com"
        + "&scope=openid profile"
        + "&login_hint=" + encodeURIComponent(user);

    window.location.href = url;
}

/* ✅ QR scanner starten */
function startScan() {
    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            html5QrCode.stop();

            /* verwacht: enkel S-nummer in QR */
            let user = decodedText.trim() + "@leerling.vbshgoor.be";

            goToTeams(user);
        },
        (error) => {
            // niets tonen
        }
    ).catch(err => {
        alert("Camera kon niet gestart worden");
    });
}

/* ✅ fallback manueel */
function getUsername() {
    let s = document.getElementById("snummer").value.trim();
    if (!s) {
        alert("Vul je S-nummer in!");
        return null;
    }
    return s + "@leerling.vbshgoor.be";
}

function openApp(app) {
    let user = getUsername();
    if (!user) return;

    let base = "https://portal.office.com/?login_hint=" + encodeURIComponent(user);

    if (app === "teams") goToTeams(user);
    if (app === "outlook") window.location.href = "https://outlook.office.com/mail/?login_hint=" + user;
    else window.location.href = base;
}
function openToolbox(klas) {

    let links = {
        l1: "https://www.canva.com/design/DAFUpBzBHGs/6wyDjMD8Qlq2vjbS9nKoog/view?utm_content=DAFUpBzBHGs&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hc1ca32412a",
        l2: "https://www.canva.com/design/DAFT_E7BGO8/g5t-f42RS_2QKPxb2QthBw/view?utm_content=DAFT_E7BGO8&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hb8c5665ae9",
        l3: "https://www.canva.com/design/DAFULuLHwxo/D3B5GonSVhfqEqwaaD6mbw/view?utm_content=DAFULuLHwxo&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h95805fc6b0",
        l4: "https://www.canva.com/design/DAGT1qUzh9s/b2FFy77S4U4Irmc41WYAeg/view?utm_content=DAGT1qUzh9s&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hf21a64cd70",
        l5: "https://www.canva.com/design/DAGT6iZW5Mw/K9Ui3yxsx0uSSehxgq2olg/view?utm_content=DAGT6iZW5Mw&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h0acbdae499",
        l6: "https://www.canva.com/design/DAFT_YiSTuo/B0CORzvLFmvSUMRDyGrfLA/view?utm_content=DAFT_YiSTuo&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hf18b776dfd"
    };

    window.location.href = links[klas];
}
``
</script>

</body>
</html>
