<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loginhelper</title>

<style>
body {
    font-family: Segoe UI, Arial, sans-serif;
    background: #d8e3f0;
    margin: 0;
}

/* container */
.container {
    max-width: 900px;
    margin: 60px auto;
    background: #f5f7fa;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* titel */
h1 {
    color: #2b4c7e;
    margin-bottom: 20px;
}

/* layout */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 25px;
}

/* input */
input {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: 2px solid #84a646;
    font-size: 16px;
    box-sizing: border-box;
}

/* knoppen */
.button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: #8eb458;
    color: white;
    font-size: 16px;
    cursor: pointer;

    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
}

.button:hover {
    background: #769d44;
}

/* office kolom */
.office h2 {
    margin-top: 0;
    color: #2b4c7e;
}

/* icoontjes */
.icon {
    width: 20px;
}

.qr-btn {
    background: #8eb458;
}

/* mobiel */
@media (max-width: 700px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Loginhelper</h1>

    <div class="grid">

        <!-- LINKS -->
        <div>
            <input id="snummer" placeholder="Typ S-nummer...">

            <button class="button" onclick="loginTeams()">
                <img class="icon" src="https://img.icons8.com/color/48/microsoft-teams.png">
                Teams openen
            </button>

            <button class="button qr-btn">
                📷 Scan QR-code
            </button>
        </div>

        <!-- RECHTS -->
        <div class="office">
            <h2>Office</h2>

            <button class="button" onclick="openApp('teams')">
                <img class="icon" src="https://img.icons8.com/color/48/microsoft-teams.png">
                Teams
            </button>

            <button class="button" onclick="openApp('word')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-word-2019.png">
                Word
            </button>

            <button class="button" onclick="openApp('ppt')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-powerpoint-2019.png">
                PowerPoint
            </button>

            <button class="button" onclick="openApp('onedrive')">
                <img class="icon" src="https://img.icons8.com/fluency/48/onedrive.png">
                OneDrive
            </button>

            <button class="button" onclick="openApp('outlook')">
                <img class="icon" src="https://img.icons8.com/color/48/outlook.png">
                Outlook
            </button>
        </div>

    </div>
</div>

<script>

function getUsername() {
    let s = document.getElementById("snummer").value.trim();
    if (!s) {
        alert("Vul je S-nummer in!");
        return null;
    }
    return s + "@leerling.vbshgoor.be"; // <-- pas domein aan
}

/* ✅ DIRECT naar Teams login */
function loginTeams() {
    let user = getUsername();
    if (!user) return;

    let url = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
        + "?client_id=1fec8e78-bce4-4aaf-ab1b-5451cc387264"  // Teams client
        + "&response_type=code"
        + "&redirect_uri=https://teams.microsoft.com"
        + "&scope=openid profile"
        + "&login_hint=" + encodeURIComponent(user);

    window.location.href = url;
}

/* ✅ andere apps */
function openApp(app) {
    let user = getUsername();
    if (!user) return;

    let base = "https://portal.office.com/?login_hint=" + encodeURIComponent(user);

    switch(app) {
        case "teams":
            loginTeams();
            break;
        case "word":
            window.location.href = base;
            break;
        case "ppt":
            window.location.href = base;
            break;
        case "onedrive":
            window.location.href = base;
            break;
        case "outlook":
            window.location.href = "https://outlook.office.com/mail/?login_hint=" + encodeURIComponent(user);
            break;
    }
}

</script>

</body>
</html>
