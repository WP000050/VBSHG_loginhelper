<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loginhelper</title>

<!-- QR scanner library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Segoe UI, Arial;
    background: #d8e3f0;
}

.container {
    max-width: 900px;
    margin: 60px auto;
    background: #f5f7fa;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 25px;
}

input {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: 2px solid #84a646;
    font-size: 16px;
}

.button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: #8eb458;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.button:hover {
    background: #769d44;
}

.office h2 {
    margin-top: 0;
    color: #2b4c7e;
}

.icon {
    width: 20px;
}

/* scanner */
#reader {
    margin-top: 15px;
}

@media (max-width: 700px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Loginhelper</h1>

    <div class="grid">

        <!-- LINKS -->
        <div>
            <input id="snummer" placeholder="Typ S-nummer (optioneel)…">

            <button class="button" onclick="startScan()">
                📷 Scan QR-code
            </button>

            <div id="reader"></div>
        </div>

        <!-- RECHTS -->
        <div class="office">
            <h2>Office</h2>

            <button class="button" onclick="openApp('teams')">
                <img class="icon" src="https://img.icons8.com/color/48/microsoft-teams.png">
                Teams
            </button>

            <button class="button" onclick="openApp('word')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-word-2019.png">
                Word
            </button>

            <button class="button" onclick="openApp('ppt')">
                <img class="icon" src="https://img.icons8.com/fluency/48/microsoft-powerpoint-2019.png">
                PowerPoint
            </button>

            <!-- ✅ FIXED ICONS -->
            <button class="button" onclick="openApp('onedrive')">
                <img class="icon" src="https://img.icons8.com/color/48/000000/onedrive.png">
                OneDrive
            </button>

            <button class="button" onclick="openApp('outlook')">
                <img class="icon" src="https://img.icons8.com/color/48/000000/microsoft-outlook-2019.png">
                Outlook
            </button>
        </div>

    </div>
</div>

<script>

/* ✅ Teams login */
function goToTeams(user) {
    let url = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
        + "?client_id=1fec8e78-bce4-4aaf-ab1b-5451cc387264"
        + "&response_type=code"
        + "&redirect_uri=https://teams.microsoft.com"
        + "&scope=openid profile"
        + "&login_hint=" + encodeURIComponent(user);

    window.location.href = url;
}

/* ✅ QR scanner starten */
function startScan() {
    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            html5QrCode.stop();

            /* verwacht: enkel S-nummer in QR */
            let user = decodedText.trim() + "@leerling.vbshgoor.be";

            goToTeams(user);
        },
        (error) => {
            // niets tonen
        }
    ).catch(err => {
        alert("Camera kon niet gestart worden");
    });
}

/* ✅ fallback manueel */
function getUsername() {
    let s = document.getElementById("snummer").value.trim();
    if (!s) {
        alert("Vul je S-nummer in!");
        return null;
    }
    return s + "@leerling.vbshgoor.be";
}

function openApp(app) {
    let user = getUsername();
    if (!user) return;

    let base = "https://portal.office.com/?login_hint=" + encodeURIComponent(user);

    if (app === "teams") goToTeams(user);
    if (app === "outlook") window.location.href = "https://outlook.office.com/mail/?login_hint=" + user;
    else window.location.href = base;
}

</script>

</body>
</html>
